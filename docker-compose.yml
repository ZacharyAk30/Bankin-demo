services:
  mlflow:
    image: python:3.13-slim
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      - MLFLOW_TRACKING_URI=http://0.0.0.0:5000
    command: >
      bash -lc "pip install -r requirements.txt &&
                mlflow server
                --host 0.0.0.0
                --port 5000
                --backend-store-uri sqlite:///data/mlflow/mlflow.db
                --default-artifact-root /app/data/mlflow/artifacts"
    ports:
      - "5000:5000"

  api:
    build: .
    environment:
      - DUCKDB_PATH=data/warehouse/bankin.duckdb
      - MODEL_LATEST_PATH=models/artifacts/latest/model.joblib
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - LLM_ENABLED=true
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
